<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lesson02 | オブジェクト指向</title>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.min.js"></script>
    <script>
      function Ball(p) {
        this.x = p;
        this.y = 0;
        this.vx = 10;
        this.vy = 10;

        this.update = function() {
          this.x += this.vx;
          this.y += this.vy;

          this.vy++;
          this.vy *= 0.99;

          if (this.x < 0 || this.x > width) {
            this.vx *= -1;
          }
          
          if (this.y > height) {
            this.vy *= -1;
          }
        }
      }

      let balls = [];

      function setup() {
        createCanvas(600, 400);
        frameRate(60);
        background(0);
      }

      function draw() {
        if (frameCount % 60 === 0) {
          balls.push(new Ball(Math.random() * width));
        }

        background(0, 50);
        for (let i = 0; i < balls.length; i++) {
          balls[i].update();
          circle(balls[i].x, balls[i].y, 30);
        }
      }
    </script>
  </body>
</html>
